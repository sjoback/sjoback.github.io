<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bringbag - Say Hello to the lifestyle!</title>
    <link rel="stylesheet" type="text/css" href="../assets/styles/style.css">
    <link rel="stylesheet" type="text/css" href="../assets/styles/vue.css">
    <link href="https://fonts.googleapis.com/css?family=Montserrat" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Permanent+Marker" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.16/dist/vue.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
</head>
<body>
    <div class="logo">
      <a href="/bringbag/index.html" class="name-logo"><h5>BRINGBAG</h5></a>
    </div>

    <div class="hamburger-menu">
      <div class="burger-circle">
         <div class="burger-icon" id="burger"  onclick="burger(this)" @click="show = !show">
            <div class="bar1"></div>
            <div class="bar2"></div>
            <div class="bar3"></div>
         </div>
      </div>
        <transition name="slide-in-right">
            <div class="push-out-menu" v-if="show">
                <ul class="menu-2">
                   <li><a href="./product.html">Bringbag</a></li>
                  <li><a href="./shop.html">Butik</a></li>
                  <li><a href="./about.html">Om företaget Bringbag</a></li>
                  <li><a href="./faq.html">FAQ - Vanliga frågor?</a></li>
                  <li><a href="./contact.html">Kontakta oss</a></li>
                </ul>
            </div>
        </transition>
        <transition name="fade-in">
            <div class="push-out-menu-dimmer" @click="show = !show" v-if="show"></div>
        </transition>
    </div>


<div class="contact-container">

<div class="contact-info">
    <h3>Vid frågor och funderingar kontakta oss via:</h3>
    <br>
    <h3>Email</h3>
    <h3><a href="mailto:info@bringbag.se" target="_top">info@bringbag.se</a></h3>
    <br>
    <h3>Telefon</h3>
    <h3>0707-070707</h3>
</div>

<div class="contact-form">
    <form action="">
        <input type="text" name="name" placeholder="Namn">
        <input type="text" name="email" placeholder="Email">
        <input type="text" name="phone" placeholder="Telefon">
        <textarea name="message" placeholder="Meddelande"></textarea>
        <input type="submit" value="Skicka">
    </form>
</div>
</div>

<script src="https://unpkg.com/vue"></script>
<script>
var aboutUs = new Vue({
    el: '.hamburger-menu',
    data: {
        show: false
    }
});



</script>
<script>
function burger(x) {
    x.classList.toggle("change");
}
</script>
</body>
</html>
